<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1442"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg4)"/>

  <circle cx="60" cy="60" r="30" fill="#F9A825" opacity="0.2"/>
  <text x="60" y="68" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="20" font-weight="bold" fill="#F9A825">۴</text>

  <text x="540" y="90" text-anchor="middle" font-family="Vazirmatn, Tahoma, sans-serif"
    font-size="38" font-weight="bold" fill="white">
    خط زمان: ده سال طوفانی
  </text>
  <rect x="250" y="110" width="580" height="3" rx="2" fill="#F9A825" opacity="0.5"/>

  <!-- خط عمودی مرکزی -->
  <line x1="540" y1="150" x2="540" y2="950" stroke="#F9A825" stroke-width="3" opacity="0.4"/>

  <!-- رویدادها - سمت راست و چپ متناوب -->
  <!-- ۱۷۸۹ باستیل -->
  <circle cx="540" cy="190" r="8" fill="#1565C0"/>
  <rect x="580" y="170" width="400" height="50" rx="10" fill="#1565C0" opacity="0.2"/>
  <text x="770" y="192" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="16" font-weight="bold" fill="#90CAF9">۱۴ ژوئیه ۱۷۸۹</text>
  <text x="770" y="212" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="18" fill="white">سقوط باستیل — آغاز انقلاب</text>

  <!-- ۱۷۸۹ حقوق بشر -->
  <circle cx="540" cy="270" r="8" fill="#1565C0"/>
  <rect x="100" y="250" width="400" height="50" rx="10" fill="#1565C0" opacity="0.2"/>
  <text x="300" y="272" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="16" font-weight="bold" fill="#90CAF9">۲۶ اوت ۱۷۸۹</text>
  <text x="300" y="292" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="18" fill="white">اعلامیه‌ی حقوق بشر و شهروند</text>

  <!-- ۱۷۹۱ قانون اساسی -->
  <circle cx="540" cy="350" r="8" fill="#1565C0"/>
  <rect x="580" y="330" width="400" height="50" rx="10" fill="#1565C0" opacity="0.15"/>
  <text x="770" y="352" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="16" font-weight="bold" fill="#90CAF9">سپتامبر ۱۷۹۱</text>
  <text x="770" y="372" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="18" fill="white">قانون اساسی — سلطنت مشروطه</text>

  <!-- ۱۷۹۲ سقوط سلطنت -->
  <circle cx="540" cy="430" r="8" fill="#B71C1C"/>
  <rect x="100" y="410" width="400" height="50" rx="10" fill="#B71C1C" opacity="0.2"/>
  <text x="300" y="432" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="16" font-weight="bold" fill="#FF8A80">۱۰ اوت ۱۷۹۲</text>
  <text x="300" y="452" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="18" fill="white">سقوط سلطنت — اعلام جمهوری</text>

  <!-- ۱۷۹۳ اعدام شاه -->
  <circle cx="540" cy="510" r="10" fill="#B71C1C"/>
  <rect x="580" y="490" width="400" height="50" rx="10" fill="#B71C1C" opacity="0.25"/>
  <text x="770" y="512" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="16" font-weight="bold" fill="#FF8A80">۲۱ ژانویه ۱۷۹۳</text>
  <text x="770" y="532" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="18" fill="white">اعدام لویی شانزدهم</text>

  <!-- ۱۷۹۳-۹۴ ترور -->
  <circle cx="540" cy="600" r="10" fill="#B71C1C"/>
  <rect x="100" y="575" width="400" height="60" rx="10" fill="#B71C1C" opacity="0.2"/>
  <text x="300" y="597" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="16" font-weight="bold" fill="#FF8A80">۱۷۹۳–۱۷۹۴</text>
  <text x="300" y="620" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="18" fill="white">دوران ترور: ~۲۰۰ هزار کشته</text>

  <!-- ۱۷۹۴ سقوط روبسپیر -->
  <circle cx="540" cy="690" r="8" fill="#F57F17"/>
  <rect x="580" y="670" width="400" height="50" rx="10" fill="#F57F17" opacity="0.15"/>
  <text x="770" y="692" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="16" font-weight="bold" fill="#FFD54F">۲۷ ژوئیه ۱۷۹۴</text>
  <text x="770" y="712" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="18" fill="white">سقوط روبسپیر — پایان ترور</text>

  <!-- ۱۷۹۹ ناپلئون -->
  <circle cx="540" cy="780" r="10" fill="#4A148C"/>
  <rect x="100" y="755" width="400" height="60" rx="10" fill="#4A148C" opacity="0.2"/>
  <text x="300" y="777" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="16" font-weight="bold" fill="#CE93D8">نوامبر ۱۷۹۹</text>
  <text x="300" y="800" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="18" fill="white">کودتای ناپلئون — پایان انقلاب</text>

  <!-- راهنما -->
  <g transform="translate(200,880)">
    <circle cx="0" cy="0" r="6" fill="#1565C0"/>
    <text x="-15" y="5" text-anchor="end" font-family="Vazirmatn, sans-serif"
      font-size="14" fill="#90CAF9">فاز لیبرال</text>
    <circle cx="200" cy="0" r="6" fill="#B71C1C"/>
    <text x="185" y="5" text-anchor="end" font-family="Vazirmatn, sans-serif"
      font-size="14" fill="#FF8A80">فاز رادیکال</text>
    <circle cx="400" cy="0" r="6" fill="#F57F17"/>
    <text x="385" y="5" text-anchor="end" font-family="Vazirmatn, sans-serif"
      font-size="14" fill="#FFD54F">ترمیدور</text>
    <circle cx="600" cy="0" r="6" fill="#4A148C"/>
    <text x="585" y="5" text-anchor="end" font-family="Vazirmatn, sans-serif"
      font-size="14" fill="#CE93D8">ناپلئونی</text>
  </g>

  <text x="540" y="1020" text-anchor="middle" font-family="Vazirmatn, sans-serif"
    font-size="16" fill="#78909C">← بکشید | ۴ از ۱۰</text>
</svg>