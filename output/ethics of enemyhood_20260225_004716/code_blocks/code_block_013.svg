  <text x="540" y="1160" text-anchor="middle" font-family="Vazirmatn, Tahoma, Arial" font-size="22" fill="#B0BEC5" direction="rtl">جنبشی که اصولش را حفظ کند، مشروعیت و حمایت بیشتری دارد.</text>

